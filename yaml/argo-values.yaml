global:
  domain: argocd.aks-andrii.local

configs:
  params:
    # Forces ArgoCD API/UI to serve on HTTP instead of HTTPS
    server.insecure: true

server:
  ingress:
    enabled: true
    ingressClassName: azure-application-gateway
    annotations:
      # No HTTPS listener/TLS cert is provisioned on the AGW (only an HTTP-80
      # frontend port exists in main.tf), so ssl-redirect would make AGIC
      # reject the whole desired-state config and no backend pool gets
      # created at all. Leave redirect disabled until TLS is configured.
      appgw.ingress.kubernetes.io/ssl-redirect: "false"
      # Explicitly tell AGW to communicate with the backend Pods over HTTP
      appgw.ingress.kubernetes.io/backend-protocol: "http"
      # Override health probe path to ensure backend pool does not register as Unhealthy
      appgw.ingress.kubernetes.io/health-probe-path: "/"
      appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399"
    hosts:
      - argocd.aks-andrii.local
    paths:
      - /
    pathType: Prefix
    # Must match the insecure port that ArgoCD exposes
    servicePort: http