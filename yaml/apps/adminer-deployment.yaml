apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
      - name: adminer
        image: adminer:latest
        ports:
        - containerPort: 8080
        env:
        # Pre-fills the Adminer login "Server" field with the in-cluster MySQL service name
        - name: ADMINER_DEFAULT_SERVER
          value: "mysql-svc"
---
apiVersion: v1
kind: Service
metadata:
  name: adminer-svc
spec:
  selector:
    app: adminer
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adminer-ingress
  annotations:
    appgw.ingress.kubernetes.io/backend-path-prefix: "/"
    # No HTTPS listener/TLS cert is provisioned on the AGW (only an HTTP-80 frontend
    # port exists in main.tf), so keep ssl-redirect disabled, matching argo-values.yaml.
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/health-probe-path: "/"
    appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399"
spec:
  ingressClassName: azure-application-gateway
  rules:
  - host: adminer.74.248.129.197.nip.io
    http:
      paths:
      - path: /adminer
        pathType: Prefix
        backend:
          service:
            name: adminer-svc
            port:
              number: 8080
