apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-workload
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/24may/aks-argo.git'
    targetRevision: main
    path: yaml/apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: guestbook
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
