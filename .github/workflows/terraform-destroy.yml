name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
      confirm:
        description: 'Type the environment name again to confirm destruction'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: [self-hosted, Linux, ARM64]
    # Same lock key convention as terraform-plan.yml/terraform-apply.yml
    # ("terraform-<env>") so a destroy can never run concurrently with a plan
    # or apply against the same environment's state.
    concurrency:
      group: terraform-${{ github.event.inputs.environment }}
      cancel-in-progress: false
    environment: ${{ github.event.inputs.environment }} # Dynamically binds to the correct GitHub Environment (required reviewers for prod)
    steps:
      - name: Validate confirmation input
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]]; then
            echo "::error::Confirmation input '${{ github.event.inputs.confirm }}' does not match environment '${{ github.event.inputs.environment }}'. Aborting."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Azure CLI
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          fi

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8" # keep in sync with the other terraform-*.yml workflows

      - name: Terraform Init
        run: terraform init -backend-config=envs/${{ github.event.inputs.environment }}/backend.hcl -reconfigure -lock-timeout=300s

      - name: Backup state before destroy
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        # Last-known-good copy independent of Azure blob versioning
        # (start-script.sh) - destroy is irreversible for real resources, so
        # this is the recovery point if state itself needs to be rebuilt/imported.
        run: terraform state pull > state-backup-pre-destroy.json

      - name: Upload state backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-backup-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: state-backup-pre-destroy.json
          retention-days: 30

      - name: Terraform Plan (destroy)
        id: plan
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: terraform plan -destroy -lock-timeout=300s -no-color -var-file=envs/${{ github.event.inputs.environment }}/${{ github.event.inputs.environment }}.tfvars -out=tfdestroy.binary

      - name: Terraform Destroy (from saved plan)
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: terraform apply -lock-timeout=300s tfdestroy.binary
