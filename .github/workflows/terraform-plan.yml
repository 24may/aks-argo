name: Terraform Plan

on:
  # Second stage of the pipeline: only run automatically once "Terraform
  # Validate" has passed, and only when that validated push is on `develop`
  # with an open PR targeting `main` (the promotion PR gate).
  workflow_run:
    workflows: ["Terraform Validate"]
    types: [completed]
  # Manual execution: pick a single environment to plan on demand.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to plan'
        required: true
        type: choice
        options: [dev, stage]
        default: dev

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # Gate + compute the env matrix once:
  # - workflow_dispatch always proceeds, planning only the chosen environment.
  # - workflow_run only proceeds if Validate succeeded on `develop` AND an
  #   open develop -> main pull request exists; in that case both dev and
  #   stage are planned (the promotion pipeline covers both).
  gate:
    runs-on: [self-hosted, Linux, ARM64]
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      matrix: ${{ steps.check.outputs.matrix }}
      pr_number: ${{ steps.check.outputs.pr_number }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('proceed', 'true');
              core.setOutput('matrix', JSON.stringify([context.payload.inputs.environment]));
              core.setOutput('pr_number', '');
              return;
            }

            const run = context.payload.workflow_run;
            if (run.conclusion !== 'success' || run.head_branch !== 'develop') {
              core.setOutput('proceed', 'false');
              core.setOutput('matrix', '[]');
              core.setOutput('pr_number', '');
              return;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              head: `${context.repo.owner}:develop`
            });

            if (prs.length === 0) {
              core.setOutput('proceed', 'false');
              core.setOutput('matrix', '[]');
              core.setOutput('pr_number', '');
              return;
            }

            core.setOutput('proceed', 'true');
            core.setOutput('matrix', '["dev","stage"]');
            core.setOutput('pr_number', String(prs[0].number));

  plan:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: [self-hosted, Linux, ARM64]
    strategy:
      matrix:
        env: ${{ fromJson(needs.gate.outputs.matrix) }}
      fail-fast: false
    # Serialize against apply/destroy on the same environment's state so a plan
    # can never be produced (or consumed) while another run is mutating state -
    # this is what causes "Error: Saved plan is stale" in the downstream apply job.
    concurrency:
      group: terraform-${{ matrix.env }}
      cancel-in-progress: false
    # Approval step: the "dev"/"stage" GitHub Environments have a
    # required-reviewers protection rule, so this job pauses for manual
    # approval before any step runs.
    environment: ${{ matrix.env }} # Dynamically binds to the correct GitHub Environment
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Azure CLI
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          fi

      - name: Check Azure credentials
        id: check_creds
        env:
          # Passing vars via env block is safer and ensures reliable loading
          CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          SUB_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [[ -n "$CLIENT_ID" && -n "$TENANT_ID" && -n "$SUB_ID" ]]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::Azure credentials not configured. Set AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID in the '${{ matrix.env }}' GitHub environment to enable Terraform plan."
          fi

      - uses: azure/login@v2
        if: steps.check_creds.outputs.available == 'true'
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        if: steps.check_creds.outputs.available == 'true'
        with:
          # Pin the same version used by terraform-apply.yml/terraform-destroy.yml/
          # terraform-validate.yml - a mismatched CLI version between plan and
          # apply can rewrite the state file to a different format/serial and
          # cause spurious diffs or lock/version errors.
          terraform_version: "1.15.8"

      - name: Terraform Init
        if: steps.check_creds.outputs.available == 'true'
        run: terraform init -backend-config=envs/${{ matrix.env }}/backend.hcl -lock-timeout=300s

      - name: Terraform Validate
        if: steps.check_creds.outputs.available == 'true'
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: steps.check_creds.outputs.available == 'true'
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        # -lock-timeout retries against the state lock instead of failing
        # immediately on transient contention (e.g. a just-finished apply
        # still releasing its lease), which discourages reaching for
        # `terraform force-unlock` - the real risk factor for state corruption.
        run: terraform plan -lock-timeout=300s -no-color -var-file=envs/${{ matrix.env }}/${{ matrix.env }}.tfvars -out=tfplan.binary
        continue-on-error: true

      - name: Plan text output
        if: steps.check_creds.outputs.available == 'true'
        run: terraform show -no-color tfplan.binary > plan_output.txt

      - name: Upload plan artifact
        if: steps.check_creds.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: tfplan.binary
          retention-days: 5

      - name: Comment PR with plan
        if: needs.gate.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            if ('${{ steps.check_creds.outputs.available }}' === 'true') {
              const plan = fs.readFileSync('plan_output.txt', 'utf8').slice(0, 60000);
              body = `#### Terraform Plan (${{ matrix.env }})\n<details><summary>Показать план</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;
            } else {
              body = `#### Terraform Plan (${{ matrix.env }})\n⚠️ Skipped: Azure credentials not configured. Please set \`AZURE_CLIENT_ID\`, \`AZURE_TENANT_ID\`, \`AZURE_SUBSCRIPTION_ID\` in the \`${{ matrix.env }}\` GitHub environment.`;
            }
            github.rest.issues.createComment({
              issue_number: ${{ needs.gate.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
