name: Terraform Apply

on:
  workflow_run:
    workflows: ["Terraform Plan"]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, Linux, ARM64]
    environment: dev   # для prod — environment: prod с required reviewers
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Azure CLI
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          fi

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3

      - name: Download plan artifact from Terraform Plan run
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Init
        run: terraform init -backend-config=envs/dev/backend.hcl

      - name: Terraform Apply (from saved plan)
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: terraform apply tfplan.binary
