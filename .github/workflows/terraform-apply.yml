name: Terraform Apply

on:
  # Third stage of the pipeline: automatically triggered once "Terraform
  # Plan" completes successfully (whether Plan itself was triggered by the
  # develop -> main PR gate or by a manual dispatch).
  workflow_run:
    workflows: ["Terraform Plan"]
    types: [completed]
  # Manual execution: pick a single environment to deploy on demand. Runs a
  # fresh plan immediately followed by apply, since there's no prior saved
  # plan artifact to reuse.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options: [dev, stage]
        default: dev

permissions:
  id-token: write
  contents: read
  actions: read   # needed to list the "Terraform Plan" run's tfplan-<env> artifacts

jobs:
  # Gate + compute the env matrix once:
  # - workflow_dispatch always proceeds, deploying only the chosen environment.
  # - workflow_run only proceeds if Plan succeeded, and the environments to
  #   apply are whichever tfplan-<env> artifacts that Plan run actually
  #   produced (so this automatically follows Plan's own matrix, whether it
  #   planned one environment or both).
  gate:
    runs-on: [self-hosted, Linux, ARM64]
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      matrix: ${{ steps.check.outputs.matrix }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('proceed', 'true');
              core.setOutput('matrix', JSON.stringify([context.payload.inputs.environment]));
              return;
            }

            const run = context.payload.workflow_run;
            if (run.conclusion !== 'success') {
              core.setOutput('proceed', 'false');
              core.setOutput('matrix', '[]');
              return;
            }

            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id
            });

            const envs = artifacts
              .map(a => a.name)
              .filter(n => n.startsWith('tfplan-'))
              .map(n => n.replace('tfplan-', ''));

            core.setOutput('proceed', envs.length > 0 ? 'true' : 'false');
            core.setOutput('matrix', JSON.stringify(envs));

  apply:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: [self-hosted, Linux, ARM64]
    strategy:
      # Keep in sync with terraform-plan.yml's matrix - one apply job per
      # environment that plan produced a tfplan-<env> artifact for (or, on
      # manual dispatch, per environment the user selected).
      matrix:
        env: ${{ fromJson(needs.gate.outputs.matrix) }}
      fail-fast: false
    # Same lock name/key as terraform-plan.yml's matrix entries and
    # terraform-destroy.yml so plan/apply/destroy never interleave and stale
    # the saved plan out from under this job.
    concurrency:
      group: terraform-${{ matrix.env }}
      cancel-in-progress: false
    # Approval step: the "dev"/"stage" GitHub Environments have a
    # required-reviewers protection rule (configured via
    # `gh api repos/24may/aks-argo/environments/<env>`), so this entire job -
    # including checkout/init - pauses for manual approval before any step
    # runs. Review the plan posted as a PR comment by "Terraform Plan" before
    # approving.
    environment: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Azure CLI
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          fi

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8" # keep in sync with the other terraform-*.yml workflows

      - name: Terraform Init
        run: terraform init -backend-config=envs/${{ matrix.env }}/backend.hcl -lock-timeout=300s

      - name: Download plan artifact from Terraform Plan run
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Plan (manual dispatch only - no prior saved plan to reuse)
        if: github.event_name == 'workflow_dispatch'
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: terraform plan -lock-timeout=300s -no-color -var-file=envs/${{ matrix.env }}/${{ matrix.env }}.tfvars -out=tfplan.binary

      - name: Backup state before apply
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        # Independent recovery point in addition to Azure blob versioning
        # (start-script.sh) - if this apply is interrupted mid-write or
        # corrupts state, the last-known-good state is preserved as an artifact.
        run: terraform state pull > state-backup-pre-apply.json

      - name: Upload state backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-backup-${{ matrix.env }}-${{ github.run_id }}
          path: state-backup-pre-apply.json
          retention-days: 30

      - name: Terraform Apply (from saved plan)
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: terraform apply -lock-timeout=300s tfplan.binary
