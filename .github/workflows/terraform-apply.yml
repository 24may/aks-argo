name: Terraform Apply

on:
  workflow_run:
    workflows: ["Terraform Plan"]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, Linux, ARM64]
    # Same lock name/key as terraform-plan.yml's "dev" matrix entry and
    # terraform-destroy.yml so plan/apply/destroy never interleave and stale
    # the saved plan out from under this job.
    concurrency:
      group: terraform-dev
      cancel-in-progress: false
    # The "dev" GitHub Environment has a required-reviewers protection rule
    # (configured via `gh api repos/24may/aks-argo/environments/dev`), so this
    # entire job - including checkout/init - pauses for manual approval before
    # any step runs. Review the plan posted as a PR comment by "Terraform Plan"
    # before approving. For prod, use environment: prod with its own reviewers.
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Azure CLI
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          fi

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8" # keep in sync with the other terraform-*.yml workflows

      - name: Download plan artifact from Terraform Plan run
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Init
        run: terraform init -backend-config=envs/dev/backend.hcl -lock-timeout=300s

      - name: Backup state before apply
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        # Independent recovery point in addition to Azure blob versioning
        # (start-script.sh) - if this apply is interrupted mid-write or
        # corrupts state, the last-known-good state is preserved as an artifact.
        run: terraform state pull > state-backup-pre-apply.json

      - name: Upload state backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-backup-dev-${{ github.run_id }}
          path: state-backup-pre-apply.json
          retention-days: 30

      - name: Terraform Apply (from saved plan)
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: terraform apply -lock-timeout=300s tfplan.binary
