name: Terraform Apply

on:
  workflow_run:
    workflows: ["Terraform Plan"]
    branches: [main]
    types: [completed]
  # Lets a human deploy a single environment (or "all") on demand, generating
  # and immediately applying a fresh plan for it - useful when you don't want
  # to wait for/depend on a prior "Terraform Plan" run's saved artifact.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options: [dev, stage, all]   # добавить prod по мере готовности процесса
        default: dev

permissions:
  id-token: write
  contents: read

jobs:
  # Computes the env matrix once so both the manual "pick one environment"
  # dispatch and the automatic post-plan matrix share the same `apply` job.
  setup:
    runs-on: [self-hosted, Linux, ARM64]
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.environment }}" != "all" ]; then
            echo "matrix=[\"${{ inputs.environment }}\"]" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=["dev","stage"]' >> "$GITHUB_OUTPUT"
          fi

  apply:
    needs: setup
    runs-on: [self-hosted, Linux, ARM64]
    strategy:
      # Keep in sync with terraform-plan.yml's matrix - one apply job per
      # environment that plan produced a tfplan-<env> artifact for (or, on
      # manual dispatch, per environment the user selected).
      matrix:
        env: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    # Same lock name/key as terraform-plan.yml's matrix entries and
    # terraform-destroy.yml so plan/apply/destroy never interleave and stale
    # the saved plan out from under this job.
    concurrency:
      group: terraform-${{ matrix.env }}
      cancel-in-progress: false
    # The "dev"/"stage" GitHub Environments have a required-reviewers
    # protection rule (configured via `gh api repos/24may/aks-argo/environments/<env>`),
    # so this entire job - including checkout/init - pauses for manual approval
    # before any step runs. Review the plan posted as a PR comment by
    # "Terraform Plan" before approving. For prod, use environment: prod with
    # its own reviewers.
    environment: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Azure CLI
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          fi

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8" # keep in sync with the other terraform-*.yml workflows

      - name: Terraform Init
        run: terraform init -backend-config=envs/${{ matrix.env }}/backend.hcl -lock-timeout=300s

      - name: Download plan artifact from Terraform Plan run
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Plan (manual dispatch only - no prior saved plan to reuse)
        if: github.event_name == 'workflow_dispatch'
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: terraform plan -lock-timeout=300s -no-color -var-file=envs/${{ matrix.env }}/${{ matrix.env }}.tfvars -out=tfplan.binary

      - name: Backup state before apply
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        # Independent recovery point in addition to Azure blob versioning
        # (start-script.sh) - if this apply is interrupted mid-write or
        # corrupts state, the last-known-good state is preserved as an artifact.
        run: terraform state pull > state-backup-pre-apply.json

      - name: Upload state backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-backup-${{ matrix.env }}-${{ github.run_id }}
          path: state-backup-pre-apply.json
          retention-days: 30

      - name: Terraform Apply (from saved plan)
        env:
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: terraform apply -lock-timeout=300s tfplan.binary
